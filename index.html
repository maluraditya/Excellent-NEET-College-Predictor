<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEET College Predictor – Excellent NEET Academy Dharwad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
      color: #333;
    }

    header {
      background-color: #991f2d;
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 50px;
    }

    .header-title {
      flex: 1;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
    }

    .enquire-btn {
      background-color: white;
      color: #991f2d;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
    }

    .enquire-btn:hover {
      background-color: #f2c12e;
      color: #991f2d;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      padding: 35px;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
      background: #fdfdfd;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      align-items: end;
    }

    .filters > div {
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 600;
      font-size: 13px;
      color: #4a5568;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input[type="number"] {
      padding: 12px 16px;
      font-size: 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      background-color: #fff;
      color: #1a202c;
      width: 100%;
      height: 48px;
      box-sizing: border-box;
      transition: all 0.2s ease;
      outline: none;
    }

    select:focus, input[type="number"]:focus {
      border-color: #991f2d;
      box-shadow: 0 0 0 3px rgba(153, 31, 45, 0.15);
    }

    .filters button {
      height: 48px;
      padding: 12px 24px;
      background-color: #f2c12e;
      border: none;
      color: #991f2d;
      font-weight: 700;
      font-size: 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 4px rgba(242, 193, 46, 0.2);
    }

    .filters button:hover {
      background-color: #e4b720;
      transform: translateY(-1px);
      box-shadow: 0 4px 6px rgba(242, 193, 46, 0.3);
    }

    .filters button:active {
      transform: translateY(0);
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-top: 30px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      background-color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 800px; /* Ensures the table doesn't compress too much on tiny screens */
    }

    th, td {
      padding: 14px 18px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background-color: #991f2d;
      color: white;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:nth-child(even) {
      background-color: #f8fafc;
    }

    tr:hover td {
      background-color: #f1f5f9;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .category-badge {
      background-color: #ebf8ff;
      color: #2b6cb0;
      border: 1px solid #bee3f8;
    }
    
    .course-badge {
      background-color: #f0fff4;
      color: #2f855a;
      border: 1px solid #c6f6d5;
    }

    @media (max-width: 768px) {
      .header-title {
        font-size: 20px;
        text-align: center;
        width: 100%;
        margin: 10px 0;
      }

      .filters {
        grid-template-columns: 1fr;
        gap: 15px;
        padding: 16px;
      }

      .container {
        margin: 20px 10px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo.png" alt="Excellent NEET Academy Dharwad">
    </div>
    <div class="header-title">NEET College Predictor</div>
    <a class="enquire-btn" href="tel:+918088573878">
      📞 Enquire Now
    </a>
  </header>

  <div class="container">
    <div class="filters">
      <div>
        <label for="rank">NEET Rank</label>
        <input type="number" id="rank" placeholder="e.g. 24000">
      </div>
      <div>
        <label for="category">Category</label>
        <select id="category">
          <option value="">All</option>
        </select>
      </div>
      <div>
        <label for="course">Course</label>
        <select id="course">
          <option value="">All</option>
        </select>
      </div>
      <div>
        <label for="fees">Fees</label>
        <select id="fees">
          <option value="">All</option>
          <option value="50000">Below ₹50,000</option>
          <option value="100000">₹50,000–₹1,00,000</option>
          <option value="500000">₹1,00,000–₹5,00,000</option>
          <option value="500001">Above ₹5,00,000</option>
        </select>
      </div>
      <div>
        <button onclick="filterColleges()">Show Colleges</button>
      </div>
    </div>

    <div id="resultsWrapper" style="display: none;" class="table-wrapper">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Sl. No.</th>
            <th>College</th>
            <th>Category</th>
            <th>Course</th>
            <th>Closing Rank</th>
            <th>Fees</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    let collegeData = [];

    async function loadData() {
      try {
        const response = await fetch('medical_colleges_data.json');
        collegeData = await response.json();

        populateDropdown('category', [...new Set(collegeData.map(c => c["Allotted Category"]))]);
        populateDropdown('course', [...new Set(collegeData.map(c => c["Course Name"]))]);
      } catch (e) {
        alert("Failed to load JSON data.");
      }
    }

    function populateDropdown(id, options) {
      const select = document.getElementById(id);
      options.sort().forEach(option => {
        const opt = document.createElement("option");
        opt.value = option;
        opt.text = option;
        select.appendChild(opt);
      });
    }

    function filterColleges() {
      const rank = parseInt(document.getElementById('rank').value);
      const category = document.getElementById('category').value;
      const course = document.getElementById('course').value;
      const feesFilter = document.getElementById('fees').value;
      const resultsBody = document.getElementById('resultsBody');
      resultsBody.innerHTML = '';

      if (isNaN(rank) || rank <= 0) {
        alert("⚠️ Please enter a valid NEET rank.");
        return;
      }

      let filtered = collegeData.filter(college => {
        const eligibleRank = rank <= college["All India Rank"];
        const matchCategory = category ? college["Allotted Category"] === category : true;
        const matchCourse = course ? college["Course Name"] === course : true;

        let matchFees = true;
        const courseFees = parseInt(college["Course_fees"]);
        if (!isNaN(courseFees) && feesFilter) {
          const feeLimit = parseInt(feesFilter);
          if (feeLimit === 50000) matchFees = courseFees < 50000;
          else if (feeLimit === 100000) matchFees = courseFees >= 50000 && courseFees <= 100000;
          else if (feeLimit === 500000) matchFees = courseFees > 100000 && courseFees <= 500000;
          else if (feeLimit === 500001) matchFees = courseFees > 500000;
        }

        return eligibleRank && matchCategory && matchCourse && matchFees;
      });

      if (filtered.length === 0) {
        resultsBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 30px; color: #718096;">No colleges found for given filters.</td></tr>';
      } else {
        const rows = filtered.map((college, index) => {
          const fees = college["Course_fees"];
          const formattedFees = fees !== null && fees !== undefined && !isNaN(fees)
            ? `₹${Number(fees).toLocaleString('en-IN')}`
            : "N/A";
          return `
            <tr>
              <td style="color: #718096; font-weight: 500;">${index + 1}</td>
              <td style="font-weight: 500; color: #1a202c;">${college["Name of the College Allotted."]}</td>
              <td><span class="badge category-badge">${college["Allotted Category"]}</span></td>
              <td><span class="badge course-badge">${college["Course Name"]}</span></td>
              <td style="font-weight: 600; color: #991f2d;">${Number(college["All India Rank"]).toLocaleString('en-IN')}</td>
              <td style="font-weight: 600; color: #2d3748;">${formattedFees}</td>
            </tr>
          `;
        }).join('');
        resultsBody.innerHTML = rows;
      }

      document.getElementById('resultsWrapper').style.display = 'block';
    }

    loadData();
  </script>
</body>
</html>
