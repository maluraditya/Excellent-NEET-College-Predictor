<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEET College Predictor – Excellent NEET Academy Dharwad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      background-color: #f9f9f9;
      color: #333;
      font-family: 'Poppins', sans-serif;
    }

    header {
      background-color: #991f2d;
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 50px;
    }

    .header-title {
      flex: 1;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
    }

    .enquire-btn {
      background-color: white;
      color: #991f2d;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
    }

    .enquire-btn:hover {
      background-color: #f2c12e;
      color: #991f2d;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      padding: 35px;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
      background: #fdfdfd;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      align-items: end;
    }

    .filters > div {
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 600;
      font-size: 13px;
      color: #4a5568;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input[type="number"] {
      padding: 12px 16px;
      font-size: 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      background-color: #fff;
      color: #1a202c;
      width: 100%;
      height: 48px;
      box-sizing: border-box;
      transition: all 0.2s ease;
      outline: none;
    }

    select:focus, input[type="number"]:focus {
      border-color: #991f2d;
      box-shadow: 0 0 0 3px rgba(153, 31, 45, 0.15);
    }

    .filters button {
      height: 48px;
      padding: 12px 24px;
      background-color: #f2c12e;
      border: none;
      color: #991f2d;
      font-weight: 700;
      font-size: 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 4px rgba(242, 193, 46, 0.2);
    }

    .filters button:hover {
      background-color: #e4b720;
      transform: translateY(-1px);
      box-shadow: 0 4px 6px rgba(242, 193, 46, 0.3);
    }

    .filters button:active {
      transform: translateY(0);
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-top: 30px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      background-color: white;
    }

    /* Custom scrollbar styling for the table wrapper */
    .table-wrapper::-webkit-scrollbar {
      height: 8px;
    }
    .table-wrapper::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 4px;
    }
    .table-wrapper::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .table-wrapper::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 800px; /* Ensures the table doesn't compress too much on tiny screens */
    }

    th, td {
      padding: 14px 18px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background-color: #991f2d;
      color: white;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:nth-child(even) {
      background-color: #f8fafc;
    }

    tr:hover td {
      background-color: #f1f5f9;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .category-badge {
      background-color: #ebf8ff;
      color: #2b6cb0;
      border: 1px solid #bee3f8;
    }
    
    .course-badge {
      background-color: #f0fff4;
      color: #2f855a;
      border: 1px solid #c6f6d5;
    }

    /* Loader styles */
    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.3s ease;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #991f2d;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loader-text {
      margin-top: 15px;
      font-weight: 600;
      color: #991f2d;
      font-size: 16px;
    }

    #mainContent {
      opacity: 0.1;
      transition: opacity 0.3s ease;
    }

    @media (max-width: 768px) {
      .header-title {
        font-size: 20px;
        text-align: center;
        width: 100%;
        margin: 10px 0;
      }

      .filters {
        grid-template-columns: 1fr;
        gap: 15px;
        padding: 16px;
      }

      .container {
        margin: 20px 10px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Spinner -->
  <div id="loader" class="loader-overlay">
    <div class="spinner"></div>
    <div class="loader-text">Loading predictor data...</div>
  </div>

  <header>
    <div class="logo">
      <img src="logo.png" alt="Excellent NEET Academy Dharwad">
    </div>
    <div class="header-title">NEET College Predictor</div>
    <a class="enquire-btn" href="tel:+918088573878">
      📞 Enquire Now
    </a>
  </header>

  <div class="container" id="mainContent">
    <div class="filters">
      <div>
        <label for="rank">NEET Rank</label>
        <input type="number" id="rank" placeholder="e.g. 24000">
      </div>
      <div>
        <label for="category">Category</label>
        <select id="category">
          <option value="">All</option>
        </select>
      </div>
      <div>
        <label for="course">Course</label>
        <select id="course">
          <option value="">All</option>
        </select>
      </div>
      <div>
        <label for="fees">Fees</label>
        <select id="fees">
          <option value="">All</option>
          <option value="50000">Below ₹50,000</option>
          <option value="100000">₹50,000–₹1,00,000</option>
          <option value="500000">₹1,00,000–₹5,00,000</option>
          <option value="500001">Above ₹5,00,000</option>
        </select>
      </div>
      <div>
        <button onclick="filterColleges()">Show Colleges</button>
      </div>
    </div>

    <div id="resultsWrapper" style="display: none;" class="table-wrapper">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Sl. No.</th>
            <th>College</th>
            <th>Category</th>
            <th>Course</th>
            <th>Closing Rank</th>
            <th>Fees</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    let collegeData = { colleges: [], categories: [], courses: [], data: [] };

    async function loadData() {
      try {
        const response = await fetch('medical_colleges_data.json?v=' + new Date().getTime());
        collegeData = await response.json();

        populateDropdown('category', collegeData.categories);
        populateDropdown('course', collegeData.courses);
        
        // Hide loader and show content
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loader').style.display = 'none';
        }, 300);
        document.getElementById('mainContent').style.opacity = '1';
      } catch (e) {
        document.getElementById('loader').innerHTML = '<div style="color: #991f2d; font-weight: bold; text-align: center; padding: 20px;">Failed to load data. Please refresh the page.</div>';
      }
    }

    function populateDropdown(id, options) {
      const select = document.getElementById(id);
      options.sort().forEach(option => {
        const opt = document.createElement("option");
        opt.value = option;
        opt.text = option;
        select.appendChild(opt);
      });
    }

    function filterColleges() {
      const rank = parseInt(document.getElementById('rank').value);
      const category = document.getElementById('category').value;
      const course = document.getElementById('course').value;
      const feesFilter = document.getElementById('fees').value;
      const resultsBody = document.getElementById('resultsBody');
      resultsBody.innerHTML = '';

      if (isNaN(rank) || rank <= 0) {
        alert("⚠️ Please enter a valid NEET rank.");
        return;
      }

      let filtered = collegeData.data.filter(row => {
        const rankVal = row[0];
        const categoryIdx = row[2];
        const courseIdx = row[3];
        const fees = row[4];

        const eligibleRank = rank <= rankVal;
        const matchCategory = category ? collegeData.categories[categoryIdx] === category : true;
        const matchCourse = course ? collegeData.courses[courseIdx] === course : true;

        let matchFees = true;
        if (fees !== null && fees !== undefined && !isNaN(fees) && feesFilter) {
          const feeLimit = parseInt(feesFilter);
          if (feeLimit === 50000) matchFees = fees < 50000;
          else if (feeLimit === 100000) matchFees = fees >= 50000 && fees <= 100000;
          else if (feeLimit === 500000) matchFees = fees > 100000 && fees <= 500000;
          else if (feeLimit === 500001) matchFees = fees > 500000;
        }

        return eligibleRank && matchCategory && matchCourse && matchFees;
      });

      if (filtered.length === 0) {
        resultsBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 30px; color: #718096;">No colleges found for given filters.</td></tr>';
      } else {
        const rows = filtered.map((row, index) => {
          const rankVal = row[0];
          const collegeName = collegeData.colleges[row[1]];
          const categoryName = collegeData.categories[row[2]];
          const courseName = collegeData.courses[row[3]];
          const fees = row[4];
          
          const formattedFees = fees !== null && fees !== undefined && !isNaN(fees)
            ? `₹${Number(fees).toLocaleString('en-IN')}`
            : "N/A";
          return `
            <tr>
              <td style="color: #718096; font-weight: 500;">${index + 1}</td>
              <td style="font-weight: 500; color: #1a202c;">${collegeName}</td>
              <td><span class="badge category-badge">${categoryName}</span></td>
              <td><span class="badge course-badge">${courseName}</span></td>
              <td style="font-weight: 600; color: #991f2d;">${Number(rankVal).toLocaleString('en-IN')}</td>
              <td style="font-weight: 600; color: #2d3748;">${formattedFees}</td>
            </tr>
          `;
        }).join('');
        resultsBody.innerHTML = rows;
      }

      document.getElementById('resultsWrapper').style.display = 'block';
    }

    loadData();
  </script>
</body>
</html>
