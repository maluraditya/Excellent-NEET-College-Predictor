<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEET College Predictor – Excellent NEET Academy Dharwad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      background-color: #f8fafc;
      color: #1e293b;
      font-family: 'Poppins', sans-serif;
    }

    header {
      background: linear-gradient(135deg, #8c1724 0%, #a81c2c 50%, #70111c 100%);
      color: white;
      padding: 16px 24px;
      box-shadow: 0 4px 16px rgba(140, 23, 36, 0.25);
      border-bottom: 3px solid #f2c12e;
    }

    .header-content {
      max-width: 1240px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .header-top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .brand-badge {
      background: #ffffff;
      padding: 6px 14px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .brand-badge img {
      height: 38px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .header-banner {
      text-align: center;
      padding: 4px 0 2px 0;
    }

    .header-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin: 0;
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.15);
    }

    .header-subtitle {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.9);
      margin: 4px 0 0 0;
    }

    .enquire-btn {
      background-color: #f2c12e;
      color: #70111c;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13.5px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
      transition: all 0.2s ease;
    }

    .enquire-btn:hover {
      background-color: #ffffff;
      color: #70111c;
      transform: translateY(-1px);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.25);
    }

    .container {
      max-width: 1240px;
      margin: 30px auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      padding: 30px;
    }

    /* Filter Card */
    .filters-card {
      background: #fdfdfd;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      margin-bottom: 24px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 18px;
      align-items: end;
    }

    .filters-grid > div {
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 600;
      font-size: 12px;
      color: #475569;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input[type="number"], input[type="text"] {
      padding: 10px 14px;
      font-size: 14px;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      background-color: #fff;
      color: #0f172a;
      width: 100%;
      height: 44px;
      box-sizing: border-box;
      transition: all 0.2s ease;
      outline: none;
      font-family: inherit;
    }

    select:focus, input[type="number"]:focus, input[type="text"]:focus {
      border-color: #991f2d;
      box-shadow: 0 0 0 3px rgba(153, 31, 45, 0.15);
    }

    .btn-submit {
      height: 44px;
      padding: 10px 20px;
      background-color: #f2c12e;
      border: none;
      color: #991f2d;
      font-weight: 700;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 2px 4px rgba(242, 193, 46, 0.25);
    }

    .btn-submit:hover {
      background-color: #e4b720;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(242, 193, 46, 0.35);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    /* Controls Header Bar */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f1f5f9;
    }

    .stats-info {
      font-size: 14px;
      color: #475569;
      font-weight: 500;
    }

    .stats-info strong {
      color: #0f172a;
    }

    .page-size-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #64748b;
    }

    .page-size-selector select {
      height: 36px;
      padding: 4px 8px;
      width: auto;
      font-size: 13px;
    }

    /* Table & Wrapper */
    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-top: 16px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
      background-color: white;
    }

    .table-wrapper::-webkit-scrollbar {
      height: 8px;
    }
    .table-wrapper::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    .table-wrapper::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .table-wrapper::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
      min-width: 820px;
    }

    th, td {
      padding: 12px 16px;
      border-bottom: 1px solid #f1f5f9;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background-color: #991f2d;
      color: white;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11.5px;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    tbody tr {
      content-visibility: auto;
      contain-intrinsic-size: 1px 45px;
      transition: background-color 0.15s ease;
    }

    tbody tr:nth-child(even) {
      background-color: #f8fafc;
    }

    tbody tr:hover {
      background-color: #f1f5f9;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    
    .category-badge {
      background-color: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }
    
    .course-badge {
      background-color: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    .details-btn {
      background-color: #f8fafc;
      border: 1px solid #cbd5e1;
      color: #475569;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .details-btn:hover {
      background-color: #991f2d;
      color: white;
      border-color: #991f2d;
    }

    .details-btn.expanded {
      background-color: #991f2d;
      color: white;
      border-color: #991f2d;
    }

    /* Accordion Details Row */
    tr.details-row {
      background-color: #f8fafc !important;
    }

    tr.details-row td {
      padding: 0 16px 16px 16px;
      border-bottom: 2px solid #e2e8f0;
    }

    .details-box {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      margin-top: 6px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .details-title {
      font-size: 12px;
      font-weight: 700;
      color: #991f2d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .sub-table {
      width: 100%;
      min-width: 0;
      font-size: 12.5px;
      border: 1px solid #f1f5f9;
      border-radius: 6px;
      overflow: hidden;
    }

    .sub-table th {
      background-color: #f1f5f9;
      color: #475569;
      font-size: 11px;
      padding: 8px 12px;
    }

    .sub-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #f1f5f9;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .page-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border: 1px solid #cbd5e1;
      background: white;
      color: #334155;
      font-weight: 600;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .page-btn:hover:not(:disabled) {
      border-color: #991f2d;
      color: #991f2d;
      background-color: #fff5f5;
    }

    .page-btn.active {
      background-color: #991f2d;
      color: white;
      border-color: #991f2d;
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .page-dots {
      color: #94a3b8;
      font-weight: 600;
      padding: 0 4px;
    }

    /* Loader styles */
    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.3s ease;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #991f2d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loader-text {
      margin-top: 14px;
      font-weight: 600;
      color: #991f2d;
      font-size: 15px;
    }

    #mainContent {
      opacity: 0.1;
      transition: opacity 0.3s ease;
    }

    @media (max-width: 768px) {
      header {
        padding: 12px 16px;
      }

      .header-content {
        gap: 10px;
      }

      .brand-badge {
        padding: 5px 10px;
        border-radius: 8px;
      }

      .brand-badge img {
        height: 30px;
      }

      .enquire-btn {
        padding: 7px 12px;
        font-size: 12px;
        border-radius: 6px;
      }

      .header-title {
        font-size: 20px;
      }

      .header-subtitle {
        font-size: 11.5px;
      }

      .container {
        margin: 15px 10px;
        padding: 16px;
      }

      .filters-card {
        padding: 16px;
      }

      .filters-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .controls-bar {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Spinner -->
  <div id="loader" class="loader-overlay">
    <div class="spinner"></div>
    <div class="loader-text">Loading predictor data...</div>
  </div>

  <header>
    <div class="header-content">
      <div class="header-top-bar">
        <div class="brand-badge">
          <img src="logo.png" alt="Excellent NEET Academy Dharwad">
        </div>
        <a class="enquire-btn" href="tel:+918088573878">
          📞 Enquire Now
        </a>
      </div>
      <div class="header-banner">
        <h1 class="header-title">NEET College Predictor</h1>
        <p class="header-subtitle">Find eligible medical colleges & cutoffs based on rank</p>
      </div>
    </div>
  </header>

  <div class="container" id="mainContent">
    <div class="filters-card">
      <div class="filters-grid">
        <div>
          <label for="rank">NEET Rank</label>
          <input type="number" id="rank" placeholder="e.g. 24000" onkeydown="if(event.key==='Enter') filterColleges()">
        </div>
        <div>
          <label for="category">Category</label>
          <select id="category" onchange="filterColleges()">
            <option value="">All Categories</option>
          </select>
        </div>
        <div>
          <label for="course">Course</label>
          <select id="course" onchange="filterColleges()">
            <option value="">All Courses</option>
          </select>
        </div>
        <div>
          <label for="fees">Fees</label>
          <select id="fees" onchange="filterColleges()">
            <option value="">All Fees</option>
            <option value="50000">Below ₹50,000</option>
            <option value="100000">₹50,000–₹1,00,000</option>
            <option value="500000">₹1,00,000–₹5,00,000</option>
            <option value="500001">Above ₹5,00,000</option>
          </select>
        </div>
        <div>
          <label for="searchCollege">Search College</label>
          <input type="text" id="searchCollege" placeholder="College name..." oninput="onSearchOrSortChange()">
        </div>
        <div>
          <label for="sortBy">Sort By</label>
          <select id="sortBy" onchange="onSearchOrSortChange()">
            <option value="rankAsc">Cutoff Rank (Low to High)</option>
            <option value="rankDesc">Cutoff Rank (High to Low)</option>
            <option value="name">College Name (A-Z)</option>
            <option value="fees">Fees (Low to High)</option>
          </select>
        </div>
        <div>
          <button class="btn-submit" onclick="filterColleges()">🔍 Show Colleges</button>
        </div>
      </div>
    </div>

    <div id="resultsWrapper" style="display: none;">
      <div class="controls-bar">
        <div class="stats-info" id="statsContainer"></div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <div class="page-size-selector">
            <span>Per page:</span>
            <select id="pageSizeSelect" onchange="changePageSize(this.value)">
              <option value="25" selected>25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
        </div>
      </div>

      <div class="pagination" id="paginationTop"></div>

      <div class="table-wrapper">
        <table id="resultsTable">
          <thead>
            <tr>
              <th style="width: 60px; text-align: center;">Sl. No.</th>
              <th>College</th>
              <th style="width: 120px;">Category</th>
              <th style="width: 150px;">Course</th>
              <th style="width: 150px;">Highest Cutoff Rank</th>
              <th style="width: 160px;">Fees</th>
              <th style="width: 130px; text-align: center;">Details</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>

      <div class="pagination" id="paginationBottom"></div>
    </div>
  </div>

  <script>
    let collegeData = { colleges: [], categories: [], courses: [], data: [] };
    let filteredGroupedColleges = [];
    let currentPage = 1;
    let pageSize = 25;
    let expandedColleges = new Set();

    async function loadData() {
      try {
        const response = await fetch('medical_colleges_data.json?v=' + new Date().getTime());
        collegeData = await response.json();

        populateDropdown('category', collegeData.categories);
        populateDropdown('course', collegeData.courses);
        
        // Hide loader and show content
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loader').style.display = 'none';
        }, 300);
        document.getElementById('mainContent').style.opacity = '1';
      } catch (e) {
        document.getElementById('loader').innerHTML = '<div style="color: #991f2d; font-weight: bold; text-align: center; padding: 20px;">Failed to load data. Please refresh the page.</div>';
      }
    }

    function populateDropdown(id, options) {
      const select = document.getElementById(id);
      options.sort().forEach(option => {
        const opt = document.createElement("option");
        opt.value = option;
        opt.text = option;
        select.appendChild(opt);
      });
    }

    function getFormattedFee(feeVal, allRows) {
      if (feeVal !== null && feeVal !== undefined && !isNaN(feeVal) && Number(feeVal) > 0) {
        return `₹${Number(feeVal).toLocaleString('en-IN')}`;
      }
      if (allRows && allRows.length > 0) {
        const validFees = [...new Set(allRows.map(r => r[4]).filter(f => f !== null && f !== undefined && !isNaN(f) && Number(f) > 0))];
        if (validFees.length === 1) {
          return `₹${Number(validFees[0]).toLocaleString('en-IN')}`;
        } else if (validFees.length > 1) {
          const minF = Math.min(...validFees);
          const maxF = Math.max(...validFees);
          return `₹${Number(minF).toLocaleString('en-IN')} – ₹${Number(maxF).toLocaleString('en-IN')}`;
        }
      }
      return "Govt Fee / Contact";
    }

    function getNumericFeeForSorting(group) {
      if (group.maxRow[4] !== null && group.maxRow[4] !== undefined && !isNaN(group.maxRow[4])) {
        return Number(group.maxRow[4]);
      }
      const validFees = group.allRows.map(r => r[4]).filter(f => f !== null && f !== undefined && !isNaN(f));
      if (validFees.length > 0) {
        return Math.min(...validFees);
      }
      return 999999999; // Sort null/unknown fees to the bottom when sorting low to high
    }

    function filterColleges() {
      const rankInput = document.getElementById('rank').value.trim();
      const rank = parseInt(rankInput);

      if (isNaN(rank) || rank <= 0) {
        alert("⚠️ Please enter a valid NEET rank.");
        return;
      }

      const category = document.getElementById('category').value;
      const course = document.getElementById('course').value;
      const feesFilter = document.getElementById('fees').value;
      const searchQuery = document.getElementById('searchCollege').value.toLowerCase().trim();

      // Map: collegeIdx -> { colIdx, collegeName, maxRow, allRows }
      const colMap = new Map();

      for (let i = 0; i < collegeData.data.length; i++) {
        const row = collegeData.data[i];
        const rankVal = row[0];
        const colIdx = row[1];
        const catIdx = row[2];
        const crsIdx = row[3];
        const fees = row[4];

        // User rank must be <= closing rank cutoff (candidate is eligible)
        if (rank > rankVal) continue;

        if (category && collegeData.categories[catIdx] !== category) continue;
        if (course && collegeData.courses[crsIdx] !== course) continue;

        if (feesFilter) {
          if (fees === null || fees === undefined || isNaN(fees)) continue;
          const limit = parseInt(feesFilter);
          if (limit === 50000 && fees >= 50000) continue;
          if (limit === 100000 && (fees < 50000 || fees > 100000)) continue;
          if (limit === 500000 && (fees <= 100000 || fees > 500000)) continue;
          if (limit === 500001 && fees <= 500000) continue;
        }

        const colName = collegeData.colleges[colIdx];
        if (searchQuery && !colName.toLowerCase().includes(searchQuery)) continue;

        let group = colMap.get(colIdx);
        if (!group) {
          group = {
            colIdx: colIdx,
            collegeName: colName,
            maxRow: row,
            allRows: [row]
          };
          colMap.set(colIdx, group);
        } else {
          group.allRows.push(row);
          // Pick the row with the highest cutoff rank (max rankVal)
          if (row[0] > group.maxRow[0]) {
            group.maxRow = row;
          }
        }
      }

      filteredGroupedColleges = Array.from(colMap.values());
      const sortBy = document.getElementById('sortBy').value;
      sortGroupedColleges(sortBy);

      currentPage = 1;
      expandedColleges.clear();
      renderResults();
    }

    function sortGroupedColleges(sortBy) {
      if (sortBy === 'rankAsc') {
        filteredGroupedColleges.sort((a, b) => a.maxRow[0] - b.maxRow[0]);
      } else if (sortBy === 'rankDesc') {
        filteredGroupedColleges.sort((a, b) => b.maxRow[0] - a.maxRow[0]);
      } else if (sortBy === 'name') {
        filteredGroupedColleges.sort((a, b) => a.collegeName.localeCompare(b.collegeName));
      } else if (sortBy === 'fees') {
        filteredGroupedColleges.sort((a, b) => getNumericFeeForSorting(a) - getNumericFeeForSorting(b));
      }
    }

    function onSearchOrSortChange() {
      if (document.getElementById('resultsWrapper').style.display !== 'none') {
        filterColleges();
      }
    }

    function changePageSize(newSize) {
      pageSize = parseInt(newSize);
      currentPage = 1;
      renderResults();
    }

    function goToPage(page) {
      const totalPages = Math.ceil(filteredGroupedColleges.length / pageSize);
      if (page >= 1 && page <= totalPages) {
        currentPage = page;
        renderResults();
        document.getElementById('resultsWrapper').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function toggleExpand(colIdx) {
      if (expandedColleges.has(colIdx)) {
        expandedColleges.delete(colIdx);
      } else {
        expandedColleges.add(colIdx);
      }
      renderResults();
    }

    function renderResults() {
      const resultsWrapper = document.getElementById('resultsWrapper');
      const resultsBody = document.getElementById('resultsBody');
      const statsContainer = document.getElementById('statsContainer');
      const paginationTop = document.getElementById('paginationTop');
      const paginationBottom = document.getElementById('paginationBottom');

      resultsWrapper.style.display = 'block';

      const totalColleges = filteredGroupedColleges.length;

      if (totalColleges === 0) {
        statsContainer.innerHTML = `<span>No colleges found matching your search.</span>`;
        resultsBody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 40px; color: #64748b; font-size: 14.5px;">No colleges found for the given filters. Try clearing filters or entering a higher rank.</td></tr>`;
        paginationTop.innerHTML = '';
        paginationBottom.innerHTML = '';
        return;
      }

      const totalPages = Math.ceil(totalColleges / pageSize);
      if (currentPage > totalPages) currentPage = totalPages;

      const startIndex = (currentPage - 1) * pageSize;
      const endIndex = Math.min(startIndex + pageSize, totalColleges);
      const currentSlice = filteredGroupedColleges.slice(startIndex, endIndex);

      statsContainer.innerHTML = `
        Showing <strong>${startIndex + 1}–${endIndex}</strong> of <strong>${totalColleges.toLocaleString('en-IN')}</strong> eligible colleges
      `;

      const htmlRows = currentSlice.map((group, sliceIdx) => {
        const globalIdx = startIndex + sliceIdx + 1;
        const maxRow = group.maxRow;
        const rankVal = maxRow[0];
        const colName = group.collegeName;
        const catName = collegeData.categories[maxRow[2]];
        const courseName = collegeData.courses[maxRow[3]];

        const formattedFees = getFormattedFee(maxRow[4], group.allRows);

        const isExpanded = expandedColleges.has(group.colIdx);
        const hasMultiple = group.allRows.length > 1;

        let rowHtml = `
          <tr>
            <td style="color: #64748b; font-weight: 500; text-align: center;">${globalIdx}</td>
            <td style="font-weight: 600; color: #0f172a; max-width: 340px;">${colName}</td>
            <td><span class="badge category-badge">${catName}</span></td>
            <td><span class="badge course-badge">${courseName}</span></td>
            <td style="font-weight: 700; color: #991f2d; font-size: 14.5px;">${Number(rankVal).toLocaleString('en-IN')}</td>
            <td style="font-weight: 600; color: #334155;">${formattedFees}</td>
            <td style="text-align: center;">
              ${hasMultiple ? `
                <button class="details-btn ${isExpanded ? 'expanded' : ''}" onclick="toggleExpand(${group.colIdx})">
                  ${isExpanded ? '▲ Hide' : `▼ Cutoffs (${group.allRows.length})`}
                </button>
              ` : `
                <span style="font-size: 12px; color: #94a3b8;">1 Cutoff</span>
              `}
            </td>
          </tr>
        `;

        if (isExpanded && hasMultiple) {
          const subRows = group.allRows.map(r => {
            const subCat = collegeData.categories[r[2]];
            const subCrs = collegeData.courses[r[3]];
            const subRank = r[0];
            const subFees = getFormattedFee(r[4]);
            return `
              <tr>
                <td><span class="badge category-badge">${subCat}</span></td>
                <td><span class="badge course-badge">${subCrs}</span></td>
                <td style="font-weight: 600; color: #991f2d;">${Number(subRank).toLocaleString('en-IN')}</td>
                <td style="font-weight: 500; color: #334155;">${subFees}</td>
              </tr>
            `;
          }).join('');

          rowHtml += `
            <tr class="details-row">
              <td colspan="7">
                <div class="details-box">
                  <div class="details-title">All Matching Cutoffs for ${colName} (${group.allRows.length} variants)</div>
                  <table class="sub-table">
                    <thead>
                      <tr>
                        <th>Category</th>
                        <th>Course</th>
                        <th>Cutoff Rank</th>
                        <th>Fees</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${subRows}
                    </tbody>
                  </table>
                </div>
              </td>
            </tr>
          `;
        }

        return rowHtml;
      }).join('');

      resultsBody.innerHTML = htmlRows;

      const pagHtml = buildPaginationHtml(currentPage, totalPages);
      paginationTop.innerHTML = pagHtml;
      paginationBottom.innerHTML = pagHtml;
    }

    function buildPaginationHtml(page, totalPages) {
      if (totalPages <= 1) return '';

      let pagesHtml = '';
      const maxButtons = 5;
      let startPage = Math.max(1, page - Math.floor(maxButtons / 2));
      let endPage = Math.min(totalPages, startPage + maxButtons - 1);

      if (endPage - startPage + 1 < maxButtons) {
        startPage = Math.max(1, endPage - maxButtons + 1);
      }

      pagesHtml += `<button class="page-btn" ${page === 1 ? 'disabled' : ''} onclick="goToPage(${page - 1})">◀ Prev</button>`;

      if (startPage > 1) {
        pagesHtml += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
        if (startPage > 2) pagesHtml += `<span class="page-dots">...</span>`;
      }

      for (let p = startPage; p <= endPage; p++) {
        pagesHtml += `<button class="page-btn ${p === page ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) pagesHtml += `<span class="page-dots">...</span>`;
        pagesHtml += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }

      pagesHtml += `<button class="page-btn" ${page === totalPages ? 'disabled' : ''} onclick="goToPage(${page + 1})">Next ▶</button>`;

      return pagesHtml;
    }

    loadData();
  </script>
</body>
</html>
